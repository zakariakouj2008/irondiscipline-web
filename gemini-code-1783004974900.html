<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronDiscipline | لا مكان للأعذار</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0A0A0A;
            color: #FFFFFF;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 40px 20px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .logo span {
            color: #D90429;
        }

        .headline {
            font-size: 3rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .subheadline {
            font-size: 1.2rem;
            color: #BDBDBD;
            margin-bottom: 50px;
            line-height: 1.6;
        }

        .cta-button {
            display: inline-block;
            background-color: #D90429;
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 20px 40px;
            border: 2px solid #D90429;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .cta-button:hover {
            background-color: transparent;
            color: #D90429;
        }

        .footer {
            margin-top: 60px;
            font-size: 0.9rem;
            color: #424242;
        }

        @media (max-width: 600px) {
            .headline { font-size: 2rem; }
            .cta-button { font-size: 1.2rem; padding: 15px 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Iron<span>Discipline</span></div>
        
        <h1 class="headline">أعذارك هي سبب فشلك. حان وقت المواجهة.</h1>
        
        <p class="subheadline">
            نحن لا نقدم تحفيزاً رخيصاً. نحن نقدم أنظمة هندسية صارمة مبنية على الميكانيكا الحيوية والمنطق المجرد. أدخل بياناتك، واجه عذرك، واستلم بروتوكول التنفيذ الخاص بك.
        </p>
        
        <!-- ضع رابط Tally.so الخاص بك مكان علامة المربع (#) -->
        <a href="https://tally.so/r/vGgeaX" class="cta-button">ابدأ التقييم الصارم الآن</a>
        
        <div class="footer">
            IronDiscipline © 2026 | نظام الأداء عالي الانضباط
        </div>
    </div>

</body>
</html>
